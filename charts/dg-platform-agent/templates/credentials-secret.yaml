{{/*
Auto-create credentials Secret from agentId + apiKey values.
Skipped when using existingSecret or externalSecret.
*/}}
{{- if and (not .Values.credentials.existingSecret) (not .Values.credentials.externalSecret.enabled) -}}
{{- if and .Values.agentId .Values.apiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dg-platform-agent.secretName" . }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
type: Opaque
data:
  DG_AGENT_ID: {{ .Values.agentId | b64enc | quote }}
  DG_API_KEY: {{ .Values.apiKey | b64enc | quote }}
{{- end }}
{{- end }}
