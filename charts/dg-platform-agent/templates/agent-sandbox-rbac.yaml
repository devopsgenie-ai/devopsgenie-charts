{{- if .Values.agentSandbox.install -}}
# NOTE: ClusterRole/ClusterRoleBinding names are suffixed with the release name
# to avoid collisions in multi-tenant clusters. Upgrading from chart versions
# prior to this change requires `helm uninstall` followed by `helm install`,
# OR manual rename of the existing cluster-scoped resources.
#
# The Namespace (agent-sandbox-system) is intentionally kept as a literal name
# because this controller uses a singleton namespace design. The namespace is
# annotated with helm.sh/resource-policy: keep so that `helm uninstall` does
# not delete a namespace potentially shared across releases. This chart cannot
# safely be installed twice into the same cluster targeting the same namespace
# without coordinated management of the shared namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-controller-{{ .Release.Name }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [persistentvolumeclaims, pods, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [agents.x-k8s.io]
    resources: [sandboxes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [agents.x-k8s.io]
    resources: [sandboxes/finalizers, sandboxes/status]
    verbs: [get, patch, update]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-controller-{{ .Release.Name }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: agent-sandbox-controller
    namespace: agent-sandbox-system
roleRef:
  kind: ClusterRole
  name: agent-sandbox-controller-{{ .Release.Name }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-sandbox-controller-extensions-{{ .Release.Name }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [agents.x-k8s.io]
    resources: [sandboxes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [extensions.agents.x-k8s.io]
    resources: [sandboxclaims, sandboxtemplates, sandboxwarmpools]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [extensions.agents.x-k8s.io]
    resources: [sandboxclaims/finalizers, sandboxclaims/status, sandboxtemplates/status, sandboxwarmpools/finalizers, sandboxwarmpools/status]
    verbs: [get, patch, update]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-sandbox-controller-extensions-{{ .Release.Name }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: agent-sandbox-controller
    namespace: agent-sandbox-system
roleRef:
  kind: ClusterRole
  name: agent-sandbox-controller-extensions-{{ .Release.Name }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
