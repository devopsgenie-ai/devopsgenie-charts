{{/*
Auto-create agent pod Secret from vcs.* values and execution config.
Skipped when using agentPod.existingSecret.
Contains VCS credentials and non-sensitive config that agent pods need.
LLM credentials are auto-provisioned by the controller during auth.
*/}}
{{- if not .Values.agentPod.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dg-platform-agent.agentPodSecretName" . }}
  namespace: {{ include "dg-platform-agent.sandboxNamespace" . }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
type: Opaque
data:
  # Execution config
  COMMAND_TIMEOUT: {{ .Values.agentPod.commandTimeout | toString | b64enc | quote }}
  # VCS configuration — credentials and repo URLs for agent pod git operations
  VCS_PROVIDER: {{ .Values.vcs.provider | b64enc | quote }}
  {{- if .Values.vcs.token }}
  VCS_TOKEN: {{ .Values.vcs.token | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.infrastructureRepoUrl }}
  INFRASTRUCTURE_REPO_URL: {{ .Values.vcs.infrastructureRepoUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.infrastructureRepoPath }}
  INFRASTRUCTURE_REPO_PATH: {{ .Values.vcs.infrastructureRepoPath | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.deploymentRepoUrl }}
  DEPLOYMENT_REPO_URL: {{ .Values.vcs.deploymentRepoUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.deploymentRepoPath }}
  DEPLOYMENT_REPO_PATH: {{ .Values.vcs.deploymentRepoPath | b64enc | quote }}
  {{- end }}
  # GitHub App auth (alternative to PAT) — agent pod generates tokens at startup
  {{- if .Values.vcs.githubApp.id }}
  GITHUB_APP_ID: {{ .Values.vcs.githubApp.id | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.githubApp.installationId }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.vcs.githubApp.installationId | toString | b64enc | quote }}
  {{- end }}
  {{- if .Values.vcs.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.vcs.githubApp.privateKey | b64enc | quote }}
  {{- end }}
{{- end }}
