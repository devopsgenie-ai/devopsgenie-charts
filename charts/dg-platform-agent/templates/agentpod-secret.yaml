{{/*
Auto-create agent pod Secret from llm.* and vcs.* values.
Skipped when using agentPod.existingSecret.
Contains LLM API keys, VCS credentials, and non-sensitive config that agent pods need.
*/}}
{{- if not .Values.agentPod.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dg-platform-agent.agentPodSecretName" . }}
  namespace: {{ include "dg-platform-agent.sandboxNamespace" . }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  # LLM configuration
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  {{- if .Values.llm.model }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  {{- end }}
  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}
  # Execution config
  COMMAND_TIMEOUT: {{ .Values.agentPod.commandTimeout | quote }}
  # VCS configuration — credentials and repo URLs for agent pod git operations
  VCS_PROVIDER: {{ .Values.vcs.provider | quote }}
  {{- if .Values.vcs.token }}
  VCS_TOKEN: {{ .Values.vcs.token | quote }}
  {{- end }}
  {{- if .Values.vcs.infrastructureRepoUrl }}
  INFRASTRUCTURE_REPO_URL: {{ .Values.vcs.infrastructureRepoUrl | quote }}
  {{- end }}
  {{- if .Values.vcs.infrastructureRepoPath }}
  INFRASTRUCTURE_REPO_PATH: {{ .Values.vcs.infrastructureRepoPath | quote }}
  {{- end }}
  {{- if .Values.vcs.deploymentRepoUrl }}
  DEPLOYMENT_REPO_URL: {{ .Values.vcs.deploymentRepoUrl | quote }}
  {{- end }}
  {{- if .Values.vcs.deploymentRepoPath }}
  DEPLOYMENT_REPO_PATH: {{ .Values.vcs.deploymentRepoPath | quote }}
  {{- end }}
  # GitHub App auth (alternative to PAT) — agent pod generates tokens at startup
  {{- if .Values.vcs.githubApp.id }}
  GITHUB_APP_ID: {{ .Values.vcs.githubApp.id | quote }}
  {{- end }}
  {{- if .Values.vcs.githubApp.installationId }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.vcs.githubApp.installationId | quote }}
  {{- end }}
  {{- if .Values.vcs.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.vcs.githubApp.privateKey | quote }}
  {{- end }}
{{- end }}
