{{- if .Values.credentials.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dg-platform-agent.fullname" . }}-credentials
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.credentials.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.credentials.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.credentials.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "dg-platform-agent.secretName" . }}
    creationPolicy: Owner
  {{- with .Values.credentials.externalSecret.data }}
  data:
    {{- range . }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key | quote }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.credentials.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
