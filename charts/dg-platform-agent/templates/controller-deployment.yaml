{{- $vcsAuthConfigured := eq (include "dg-platform-agent.vcsAuthConfigured" .) "true" -}}
{{- if and (not .Values.apiKey) (not .Values.credentials.existingSecret) (not .Values.credentials.externalSecret.enabled) }}
{{- fail "\n\nNo agent credentials configured. Set ONE of:\n  --set apiKey=dk_xxxxx\n  --set credentials.existingSecret=<secret-name>\n  --set credentials.externalSecret.enabled=true (with secretStoreRef + data/dataFrom)\nThe controller cannot authenticate to the DevOps Genie platform without credentials." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dg-platform-agent.fullname" . }}-controller
  labels:
    {{- include "dg-platform-agent.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "dg-platform-agent.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/credentials: {{ include (print $.Template.BasePath "/credentials-secret.yaml") . | sha256sum }}
        checksum/agentpod-secret: {{ include (print $.Template.BasePath "/agentpod-secret.yaml") . | sha256sum }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "dg-platform-agent.controller.selectorLabels" . | nindent 8 }}
        dg-role: controller
    spec:
      {{- include "dg-platform-agent.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.controller.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      serviceAccountName: {{ include "dg-platform-agent.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: controller
          image: {{ include "dg-platform-agent.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: DG_WS_URL
              value: {{ .Values.server.wsUrl | quote }}
            - name: DG_AUTH_URL
              value: {{ .Values.server.authUrl | quote }}
            # In-cluster controller reaches sandbox pods directly via K8s DNS.
            # "tunnel" mode requires a platform-internal sandbox-router-svc that
            # is not part of this chart. Override via controller.env if needed.
            - name: SANDBOX_CONNECTION_MODE
              value: {{ .Values.controller.env.SANDBOX_CONNECTION_MODE | default .Values.controller.connectionMode | quote }}
            - name: SANDBOX_NAMESPACE
              value: {{ include "dg-platform-agent.sandboxNamespace" . | quote }}
            - name: SANDBOX_TEMPLATE_NAME
              value: {{ include "dg-platform-agent.sandboxTemplateName" . | quote }}
            - name: MAX_CONCURRENT_PODS
              value: {{ .Values.maxAgents | quote }}
            - name: SESSION_IDLE_TTL_SECONDS
              value: {{ .Values.sandbox.sessionIdleTtlSeconds | quote }}
            - name: HEALTH_PORT
              value: "8080"
            # ── Warm pool ────────────────────────────────────────────────
            # Pre-claimed pods kept ready for near-instant assignment.
            - name: WARM_POOL_SIZE
              value: {{ .Values.controller.warmPool.size | quote }}
            - name: WARM_POOL_MAX_AGE_SECONDS
              value: {{ .Values.controller.warmPool.maxAgeSeconds | quote }}
            - name: WARM_POOL_REPLENISH_INTERVAL
              value: {{ .Values.controller.warmPool.replenishIntervalSeconds | quote }}
            - name: WARM_POOL_HEALTH_INTERVAL
              value: {{ .Values.controller.warmPool.healthIntervalSeconds | quote }}
            # ── Capability flags ─────────────────────────────────────────
            # Derived from VCS configuration so the controller can report
            # its enabled capabilities to the platform on connect.
            - name: DG_CAPABILITY_TERRAFORM_CODEGEN
              value: {{ if and $vcsAuthConfigured .Values.vcs.infrastructureRepoUrl }}"true"{{ else }}"false"{{ end }}
            - name: DG_CAPABILITY_K8S_DEPLOYMENT
              value: {{ if and $vcsAuthConfigured .Values.vcs.deploymentRepoUrl }}"true"{{ else }}"false"{{ end }}
            - name: DG_CAPABILITY_CICD_PIPELINE
              value: {{ if and $vcsAuthConfigured (or .Values.vcs.infrastructureRepoUrl .Values.vcs.deploymentRepoUrl) }}"true"{{ else }}"false"{{ end }}
            - name: DG_CAPABILITY_COST_OPTIMIZATION
              value: "true"
            {{- $reserved := list "SANDBOX_CONNECTION_MODE" "WARM_POOL_SIZE" "WARM_POOL_MAX_AGE_SECONDS" "WARM_POOL_REPLENISH_INTERVAL" "WARM_POOL_HEALTH_INTERVAL" }}
            {{- range $k, $v := .Values.controller.env }}
            {{- if not (has $k $reserved) }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "dg-platform-agent.fullname" . }}-agent-pod-config
            - secretRef:
                name: {{ include "dg-platform-agent.secretName" . }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
