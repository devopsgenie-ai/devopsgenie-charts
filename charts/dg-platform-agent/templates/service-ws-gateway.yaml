apiVersion: v1
kind: Service
metadata:
  name: {{ include "dg-platform-agent.fullname" . }}-ws-gateway
  labels:
    {{- include "dg-platform-agent.wsGateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.wsGateway.service.type }}
  ports:
    - port: {{ .Values.wsGateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dg-platform-agent.wsGateway.selectorLabels" . | nindent 4 }}
