{{- if .Values.agentSandbox.install -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
spec:
  selector:
    app: agent-sandbox-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-sandbox-controller
  namespace: agent-sandbox-system
  labels:
    app: agent-sandbox-controller
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-sandbox-controller
  template:
    metadata:
      labels:
        app: agent-sandbox-controller
        app.kubernetes.io/name: agent-sandbox-controller
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sandbox-controller
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      serviceAccountName: agent-sandbox-controller
      containers:
        - name: agent-sandbox-controller
          image: {{ .Values.agentSandbox.image.repository }}:{{ .Values.agentSandbox.image.tag }}
          args:
            - "--leader-elect=true"
            - "--extensions"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
{{- end }}
