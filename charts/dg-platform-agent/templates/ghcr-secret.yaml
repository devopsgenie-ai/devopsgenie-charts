{{/*
Auto-create GHCR pull secret from imageCredentials.token.
Skipped when using imageCredentials.existingSecret.
*/}}
{{- if and .Values.imageCredentials.token (not .Values.imageCredentials.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dg-platform-agent.ghcrSecretName" . }}
  labels:
    {{- include "dg-platform-agent.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"ghcr.io":{"username":"%s","password":"%s","auth":"%s"}}}` .Values.imageCredentials.username .Values.imageCredentials.token (printf "%s:%s" .Values.imageCredentials.username .Values.imageCredentials.token | b64enc) | b64enc | quote }}
{{- end }}
