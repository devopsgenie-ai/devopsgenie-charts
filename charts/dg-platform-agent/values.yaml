# ============================================================================
# REQUIRED — You must set these values
# ============================================================================
#
# SECURITY: Do NOT put real secrets in this file if you commit it to git.
# Pass them via --set flags or a gitignored file instead:
#
#   helm install dg-agent devopsgenie/dg-agent \
#     --namespace devopsgenie --create-namespace \
#     --set apiKey=dk_xxxxx \
#     --set imageCredentials.existingSecret=devopsgenie-pull-secret
#
# Or use a separate secrets file (add to .gitignore):
#
#   helm install dg-agent devopsgenie/dg-agent -f values.yaml -f secrets.yaml
#
# For production, use credentials.existingSecret or credentials.externalSecret
# (see ADVANCED section below).
# ============================================================================

# global holds settings shared across all images in this chart.
global:
  # global.imageRegistry, when set, replaces the registry host of EVERY image
  # (controller, agent pod, agent-sandbox controller) while preserving the
  # repository path. Use this for air-gapped or mirrored installs, e.g.
  # "harbor.internal.example.com" turns
  # "registry.devopsgenie.ai/devopsgenie-agent/dg-controller" into
  # "harbor.internal.example.com/devopsgenie-agent/dg-controller".
  imageRegistry: ""

# apiKey is your DevOps Genie API key (provided by DG platform)
# Pass via: --set apiKey=dk_xxxxx
apiKey: ""

# imageCredentials configures access to private DevOps Genie container images
imageCredentials:
  # imageCredentials.registry is the private registry host used when the chart creates a pull secret
  registry: "registry.devopsgenie.ai"
  # imageCredentials.token is a private registry pull token (provided by DG)
  # Pass via: --set imageCredentials.token=xxxxx --set imageCredentials.username=xxxxx
  # The chart auto-creates a pull secret from this token.
  # For external secret management, leave empty and use imageCredentials.existingSecret.
  token: ""
  # imageCredentials.username is the private registry pull username
  username: ""
  # imageCredentials.existingSecret references a pre-created kubernetes.io/dockerconfigjson Secret
  existingSecret: ""

# vcs configures VCS (source control) access for agent pods.
# Credentials and repo URLs are injected directly into agent pods as env vars.
# The platform backend stores NOTHING VCS-related — all config lives here.
vcs:
  # vcs.provider selects the VCS provider ("github", "gitlab", or "bitbucket")
  provider: "github"
  # vcs.token is the VCS access token (GitHub PAT, GitLab PAT, Bitbucket app password)
  # Pass via: --set vcs.token=ghp_xxxxx
  # Token resolution in agent pod: VCS_TOKEN → GITHUB_TOKEN / GITLAB_TOKEN / BITBUCKET_TOKEN
  # NOTE: If using GitHub App auth (below), leave this empty — the agent pod
  # generates short-lived tokens automatically from the App credentials.
  token: ""
  # vcs.infrastructureRepoUrl is the HTTPS clone URL for the IaC repository
  infrastructureRepoUrl: ""
  # vcs.infrastructureRepoPath is the subdirectory within the repo (optional, e.g. "terraform/")
  infrastructureRepoPath: ""
  # vcs.deploymentRepoUrl is the HTTPS clone URL for the K8s manifest repository
  deploymentRepoUrl: ""
  # vcs.deploymentRepoPath is the subdirectory within the repo (optional, e.g. "k8s/")
  deploymentRepoPath: ""
  # ── GitHub App auth (alternative to PAT) ────────────────────────────────
  # Like Atlantis: pass app-id + installation-id + private-key.
  # The agent pod generates short-lived installation tokens (~1h) at startup.
  # If these are set AND vcs.token is empty, the pod uses GitHub App auth.
  githubApp:
    # vcs.githubApp.id is the GitHub App ID (numeric)
    # Pass via: --set vcs.githubApp.id=123456
    id: ""
    # vcs.githubApp.installationId is the installation ID for the target org/user
    # Pass via: --set vcs.githubApp.installationId=78901234
    installationId: ""
    # vcs.githubApp.privateKey is the PEM-encoded RSA private key
    # Pass via: --set-file vcs.githubApp.privateKey=path/to/app-key.pem
    # --set-file handles multi-line PEM content, but still stores the key in Helm release storage.
    # For production, store this in your external secret manager and reference via agentPod.existingSecret.
    privateKey: ""

# ============================================================================
# OPTIONAL — Sensible defaults, override only if needed
# ============================================================================

# maxAgents is the maximum number of concurrent agent pods
maxAgents: 10

# server is the DevOps Genie platform server endpoints (override for on-prem or staging)
server:
  # server.wsUrl is the WebSocket URL the controller connects to
  wsUrl: "wss://agent.devopsgenie.ai/ws/agent"
  # server.authUrl is the authentication endpoint
  authUrl: "https://agent.devopsgenie.ai/api/v1/agents/auth"

# ============================================================================
# ADVANCED — Only change if you know what you're doing
# ============================================================================

# credentials configures how agent credentials (DG_API_KEY) are managed.
# By default, the chart creates a Secret from apiKey above.
# Set existingSecret to use a pre-created Secret, or enable externalSecret for ESO.
credentials:
  # credentials.existingSecret skips Secret creation and uses this Secret name instead
  existingSecret: ""
  # credentials.externalSecret uses External Secrets Operator to sync credentials
  externalSecret:
    enabled: false
    refreshInterval: 1h
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    data: []
    #  - secretKey: DG_API_KEY
    #    remoteRef:
    #      key: devopsgenie/api-key
    # credentials.externalSecret.dataFrom uses full ESO dataFrom items.
    # Example: [{extract: {key: "prod/dg-platform-agent"}}]
    dataFrom: []

# controller configures the DG controller deployment
controller:
  image:
    # controller.image.repository is the container image repository
    repository: registry.devopsgenie.ai/devopsgenie-agent/dg-controller
    # controller.image.tag overrides the image tag (defaults to Chart appVersion)
    tag: ""
    # controller.image.pullPolicy is the Kubernetes image pull policy
    pullPolicy: IfNotPresent
  # controller.replicaCount is the number of controller pod replicas
  replicaCount: 1
  # controller.priorityClassName assigns a PriorityClass to the controller pod
  # so it survives node-pressure eviction ahead of best-effort workloads.
  priorityClassName: ""
  # controller.warmPool tunes the pre-warmed agent pod pool. Warm pods are
  # pre-claimed so conversations get a pod in <100ms instead of waiting 30-120s
  # for on-demand creation. Pods are health-checked and rotated by age.
  warmPool:
    # controller.warmPool.size is the number of spare pods kept ready (0 disables).
    size: 2
    # controller.warmPool.maxAgeSeconds rotates a warm pod after this age.
    maxAgeSeconds: 600
    # controller.warmPool.replenishIntervalSeconds is how often the pool refills.
    replenishIntervalSeconds: 10
    # controller.warmPool.healthIntervalSeconds is how often pooled pods are health-checked.
    healthIntervalSeconds: 30
  # controller.connectionMode controls how the controller reaches sandbox pods.
  # "direct" (default): in-cluster, reaches pods directly via Kubernetes DNS.
  # "tunnel": out-of-cluster only — requires a platform-internal sandbox-router
  # service that is NOT shipped with this chart. Do not change unless instructed.
  connectionMode: "direct"
  # controller.resources defines CPU/memory requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # controller.env is additional environment variables (non-sensitive only)
  env: {}
  # controller.podAnnotations are additional annotations added to the controller pod.
  # Use this for observability integrations such as OTel auto-instrumentation.
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# agentPod configures the agent pods spawned inside sandboxes
agentPod:
  image:
    # agentPod.image.repository is the agent pod container image
    repository: registry.devopsgenie.ai/devopsgenie-agent/dg-agent-pod
    # agentPod.image.tag overrides the agent pod image tag.
    # Leave empty to track the chart appVersion (same behavior as the controller).
    tag: ""
    # agentPod.image.pullPolicy is the Kubernetes image pull policy
    pullPolicy: IfNotPresent
  # agentPod.resources for agent pod containers
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  # agentPod.workspaceSize is the size of the /work volume. For the default
  # emptyDir backend this is the node-ephemeral-storage sizeLimit; for the
  # "ephemeral" storage backend (see agentPod.storage) it is the requested PVC size.
  workspaceSize: 10Gi
  # agentPod.cacheSize is the size of the /cache volume. Used by the skills
  # materializer to cache content-addressed tarballs across tasks/conversations
  # on the same pod. Always backed by emptyDir (node-local for speed).
  cacheSize: 2Gi
  # agentPod.storage controls how the /work (workspace) volume is backed.
  # Default "emptyDir" uses node ephemeral storage — fast, zero-provisioning,
  # and correct for short-lived sandboxes. Switch to "ephemeral" to back /work
  # with a dynamically-provisioned, per-pod PVC (a Kubernetes generic ephemeral
  # volume) when you need a specific StorageClass, a dedicated/encrypted disk,
  # or more space than the node's ephemeral storage provides. The PVC is created
  # and DELETED with the pod (owned by it) — no orphans, safe with warm-pool
  # rotation. Note: provisioning a real disk adds startup latency to each pod.
  storage:
    # agentPod.storage.type is "emptyDir" (default) or "ephemeral".
    type: emptyDir
    # agentPod.storage.storageClassName selects the StorageClass for type=ephemeral.
    # Empty string uses the cluster's default StorageClass.
    storageClassName: ""
    # agentPod.storage.accessModes are the PVC access modes for type=ephemeral.
    accessModes:
      - ReadWriteOnce
  # agentPod.commandTimeout is the max seconds a single command can run inside the agent
  commandTimeout: 1800
  # agentPod.llm configures LiteLLM client runtime behavior inside agent pods.
  llm:
    # agentPod.llm.timeoutSeconds is the per-request LiteLLM client timeout.
    timeoutSeconds: 300
    # agentPod.llm.maxRetries is the number of LiteLLM client retries.
    maxRetries: 2
  # agentPod.existingSecret references a pre-created Secret for agent pod env vars.
  # Use this for managing VCS keys and execution config externally.
  # The Secret should contain VCS_TOKEN, COMMAND_TIMEOUT, etc.
  # LLM credentials (LITELLM_API_KEY, LITELLM_BASE_URL) are auto-provisioned
  # by the controller during auth — do NOT include them in this secret.
  existingSecret: ""
  # agentPod.env is additional non-sensitive env vars for agent pods
  env: {}
  # agentPod.serviceAccount controls the ServiceAccount used by spawned agent pods.
  # The default ServiceAccount is intentionally not used because agent pods run automation.
  serviceAccount:
    # agentPod.serviceAccount.create enables creating a dedicated no-RBAC ServiceAccount
    create: true
    # agentPod.serviceAccount.name overrides the dedicated ServiceAccount name
    name: ""
    # agentPod.serviceAccount.annotations adds annotations to the dedicated ServiceAccount
    annotations: {}
  # agentPod.priorityClassName assigns a PriorityClass to spawned agent pods.
  priorityClassName: ""
  nodeSelector: {}
  # agentPod.affinity sets pod affinity/anti-affinity rules for agent pods.
  affinity: {}
  tolerations: []

# sandbox configures advanced sandbox behavior
sandbox:
  # sandbox.sessionIdleTtlSeconds is idle time before pod cleanup
  sessionIdleTtlSeconds: 900
  # sandbox.networkPolicy controls agent pod network isolation
  networkPolicy:
    # sandbox.networkPolicy.enabled creates egress restrictions on agent pods
    enabled: true
    # sandbox.networkPolicy.dnsEgressCidrs allows DNS (port 53) egress to these CIDRs,
    # in addition to in-cluster kube-dns pods. This is REQUIRED on GKE clusters with
    # NodeLocal DNSCache enabled: there, queries to the kube-dns ClusterIP are
    # intercepted by a per-node cache served from the node host (link-local
    # 169.254.20.10), which the pod-selector DNS rule cannot match — so ALL DNS
    # resolution from agent pods fails (e.g. "Could not resolve host: github.com").
    # Default 0.0.0.0/0 keeps resolution working on any DNS topology and is low-risk
    # (port 53 only). To tighten, set this to your kube-dns ClusterIP plus
    # 169.254.20.10/32, e.g. ["10.96.0.10/32", "169.254.20.10/32"].
    dnsEgressCidrs:
      - 0.0.0.0/0
    # sandbox.networkPolicy.allowedPrivateCidrs allows HTTPS/Kubernetes API access to private endpoints
    allowedPrivateCidrs:
      - 10.0.0.0/8
    # sandbox.networkPolicy.publicEgressPorts allows outbound internet access for git, registries, and APIs.
    # Port 22 supports SSH git remotes; remove it if your org only allows HTTPS.
    publicEgressPorts:
      - 443
      - 22
    # sandbox.networkPolicy.extraEgress adds custom NetworkPolicy egress rules for private git, proxies, or registries.
    # These rules are passed through verbatim and can widen egress if misconfigured.
    extraEgress: []

# agentSandbox controls installation of the upstream agent-sandbox controller (k8s-sigs)
agentSandbox:
  # agentSandbox.install enables deploying the agent-sandbox CRD controller
  # Set to false if you already have agent-sandbox installed in your cluster
  install: true
  image:
    repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
    tag: "v0.2.1"

# serviceAccount controls ServiceAccount creation
serviceAccount:
  # serviceAccount.create enables ServiceAccount creation
  create: true
  # serviceAccount.name overrides the ServiceAccount name
  name: ""
  # serviceAccount.annotations adds annotations (e.g. IRSA role ARN)
  annotations: {}

# nameOverride overrides the chart name in resource names
nameOverride: ""
# fullnameOverride fully overrides generated resource names
fullnameOverride: ""
