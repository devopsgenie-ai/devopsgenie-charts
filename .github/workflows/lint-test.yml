# Lint and test Helm charts on push/PR when charts or this workflow change.
name: Lint and Test Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'scripts/**'
      - '.github/workflows/lint-test.yml'
      - '.github/workflows/release-dg-platform-agent.yml'
  pull_request:
    paths:
      - 'charts/**'
      - 'scripts/**'
      - '.github/workflows/lint-test.yml'
      - '.github/workflows/release-dg-platform-agent.yml'

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint dg-platform-agent
        run: |
          helm lint charts/dg-platform-agent \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr

  template-test:
    name: Template Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Template dg-platform-agent (default)
        run: |
          helm template test charts/dg-platform-agent \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr
          echo "Template rendered successfully (default)"

      - name: Template dg-platform-agent (no agent-sandbox)
        run: |
          helm template test charts/dg-platform-agent \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr \
            --set agentSandbox.install=false
          echo "Template rendered successfully (agentSandbox disabled)"

      - name: Template dg-platform-agent (ESO enabled)
        run: |
          helm template test charts/dg-platform-agent \
            --set credentials.externalSecret.enabled=true \
            --set credentials.externalSecret.secretStoreRef.name=aws-sm \
            --set credentials.externalSecret.secretStoreRef.kind=ClusterSecretStore \
            --set imageCredentials.existingSecret=ghcr
          echo "Template rendered successfully (ESO enabled)"

      - name: Template dg-platform-agent (controller-owned warm pool)
        run: |
          helm template test charts/dg-platform-agent \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr \
            --set-string controller.env.WARM_POOL_SIZE=2 \
            --set-string controller.env.SANDBOX_CONNECTION_MODE=direct
          echo "Template rendered successfully (controller-owned warm pool)"

      - name: Validate credentials are required
        run: |
          if helm template test charts/dg-platform-agent >/tmp/dg-platform-agent-schema.out 2>&1; then
            echo "Expected chart render without credentials to fail"
            exit 1
          fi
          grep -E "apiKey" /tmp/dg-platform-agent-schema.out

      - name: Run dg-platform-agent regression tests
        run: bash scripts/test-dg-platform-agent.sh
