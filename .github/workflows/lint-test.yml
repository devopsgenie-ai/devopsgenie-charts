# Lint and test Helm charts on push/PR when charts or this workflow change.
name: Lint and Test Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'ct.yaml'
      - '.github/workflows/lint-test.yml'
  pull_request:
    paths:
      - 'charts/**'
      - 'ct.yaml'
      - '.github/workflows/lint-test.yml'

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2
        with:
          version: "v3.9.0"
          config: "ct.yaml"

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml 2>/dev/null || true)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed charts: $changed"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No chart changes detected"
          fi

      - name: Lint charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

  template-test:
    name: Template Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Template dg-platform-agent (default)
        run: |
          helm template test charts/dg-platform-agent \
            --set existingSecret=test-secret \
            --set ghcr.existingSecret=ghcr
          echo "Template rendered successfully (default)"

      - name: Template dg-platform-agent (no agent-sandbox)
        run: |
          helm template test charts/dg-platform-agent \
            --set existingSecret=test-secret \
            --set ghcr.existingSecret=ghcr \
            --set agentSandbox.install=false
          echo "Template rendered successfully (agentSandbox disabled)"

      - name: Template dg-platform-agent (ESO enabled)
        run: |
          helm template test charts/dg-platform-agent \
            --set externalSecret.enabled=true \
            --set externalSecret.secretStoreRef.name=aws-sm \
            --set ghcr.externalSecret.enabled=true \
            --set ghcr.externalSecret.secretStoreRef.name=aws-sm \
            --set ghcr.externalSecret.remoteRef.key=ghcr-token
          echo "Template rendered successfully (ESO enabled)"

      - name: Lint dg-platform-agent
        run: helm lint charts/dg-platform-agent
