# Release dg-platform-agent Helm chart only.
# Like https://github.com/grafana/k8s-monitoring-helm/blob/main/.github/workflows/release.yml
# Tag = <chart>-<version> (chart-specific, like Grafana k8s-monitoring-helm).
name: Release dg-platform-agent chart

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump version in Chart.yaml (patch/minor/major). Use "none" to keep current version.'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: none
      release_name:
        description: 'Release title (default: dg-platform-agent-<version>)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

env:
  CHART: dg-platform-agent

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Validate chart
        run: |
          CHART_PATH="charts/${{ env.CHART }}"

          helm lint "$CHART_PATH" \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr

          helm template test "$CHART_PATH" \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr >/dev/null

          helm template test "$CHART_PATH" \
            --set credentials.existingSecret=test-secret \
            --set imageCredentials.existingSecret=ghcr \
            --set agentSandbox.install=false >/dev/null

          helm template test "$CHART_PATH" \
            --set credentials.externalSecret.enabled=true \
            --set credentials.externalSecret.secretStoreRef.name=aws-sm \
            --set credentials.externalSecret.secretStoreRef.kind=ClusterSecretStore \
            --set imageCredentials.existingSecret=ghcr >/dev/null

          if helm template test "$CHART_PATH" >/tmp/dg-platform-agent-schema.out 2>&1; then
            echo "Expected chart render without credentials to fail"
            exit 1
          fi
          grep -E "agentId|apiKey" /tmp/dg-platform-agent-schema.out

      - name: Bump version in Chart.yaml
        if: github.event.inputs.bump != 'none'
        run: |
          CHART="${{ env.CHART }}"
          CHART_PATH="charts/${CHART}/Chart.yaml"
          V=$(grep '^version:' "$CHART_PATH" | sed 's/.*version: *//' | tr -d '"\n\r ')
          IFS='.' read -r major minor patch <<< "$V"
          case "${{ github.event.inputs.bump }}" in
            patch) patch=$((patch + 1)) ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            major) major=$((major + 1)); minor=0; patch=0 ;;
            *) exit 1 ;;
          esac
          NEXT="${major}.${minor}.${patch}"
          TAG="${CHART}-${NEXT}"
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Release tag already exists: ${TAG}"
            exit 1
          fi
          sed -i "s/^version:.*/version: ${NEXT}/" "$CHART_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CHART_PATH"
          git commit -m "chore(${CHART}): bump version to ${NEXT}"
          git push origin HEAD:main

      - name: Get chart version and tag
        id: chart-version
        run: |
          CHART="${{ env.CHART }}"
          CHART_PATH="charts/${CHART}"
          if [[ ! -d "$CHART_PATH" ]]; then
            echo "::error::Chart not found: $CHART_PATH"
            exit 1
          fi
          V=$(grep '^version:' "$CHART_PATH/Chart.yaml" | sed 's/.*version: *//' | tr -d '"\n\r ')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=${CHART}-${V}" >> $GITHUB_OUTPUT
          echo "chart=$CHART" >> $GITHUB_OUTPUT

      - name: Ensure release tag does not exist
        run: |
          TAG="${{ steps.chart-version.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Release tag already exists: ${TAG}"
            exit 1
          fi

      - name: Package chart
        run: |
          CHART="${{ steps.chart-version.outputs.chart }}"
          V="${{ steps.chart-version.outputs.version }}"
          mkdir -p release
          helm package "charts/${CHART}" --version "$V"
          mv "${CHART}-${V}.tgz" release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.chart-version.outputs.tag }}
          name: ${{ github.event.inputs.release_name || steps.chart-version.outputs.tag }}
          files: release/*.tgz
          generate_release_notes: true

      - name: Prepare gh-pages branch
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add pages origin/gh-pages
          else
            git worktree add --detach pages
            (cd pages && git checkout --orphan gh-pages && git rm -rf . 2>/dev/null || true)
          fi

      - name: Update Helm repo index (gh-pages)
        run: |
          cp release/*.tgz pages/
          REPO_URL="https://devopsgenie-ai.github.io/devopsgenie-charts"
          if [ -s pages/index.yaml ] && grep -q '^entries:' pages/index.yaml; then
            helm repo index pages --merge pages/index.yaml --url "$REPO_URL"
          else
            helm repo index pages --url "$REPO_URL"
          fi

      - name: Add landing page
        run: |
          cat << 'HTMLEOF' | sed 's/^            //' > pages/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>DevOps Genie – Helm Charts</title>
          </head>
          <body style="font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6;">
            <h1>DevOps Genie</h1>
            <p>Helm charts for <a href="https://github.com/devopsgenie-ai">devopsgenie-ai</a>. Documentation at <a href="https://docs.devopsgenie.ai">docs.devopsgenie.ai</a>.</p>
            <h2>Helm repo</h2>
            <pre style="background: #f4f4f4; padding: 1rem; overflow-x: auto;"><code>helm repo add devopsgenie https://devopsgenie-ai.github.io/devopsgenie-charts/
            helm repo update
            helm search repo devopsgenie</code></pre>
            <h2>Charts</h2>
            <ul>
              <li><strong>dg-platform-agent</strong> – DevOps Genie Agent for client clusters (Controller, Agent Sandbox, Agent Pods)</li>
            </ul>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push gh-pages
        run: |
          cd pages
          git add -A
          git add -f *.tgz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --staged --quiet; then
            git commit -m "Publish ${{ env.CHART }}-${{ steps.chart-version.outputs.version }}"
            git push origin HEAD:gh-pages
          fi
